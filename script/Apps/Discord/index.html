<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Invite</title>
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: rgba(24, 24, 27, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-hover: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            --online: #10b981;
            --offline: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(168, 85, 247, 0.1) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .invite-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 640px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .content-section {
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .server-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .server-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #27272a, #18181b);
            border: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .server-icon svg {
            width: 32px;
            height: 32px;
            color: #e4e4e7;
        }

        .server-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .server-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stats {
            display: flex;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.online { background-color: var(--online); box-shadow: 0 0 8px var(--online); }
        .dot.offline { background-color: var(--offline); }

        .join-btn {
            background: var(--accent-gradient);
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
            background: var(--accent-hover);
        }

        .qr-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
            min-width: 220px;
        }

        .qr-wrapper {
            background: white;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .qr-wrapper:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .qr-image {
            width: 130px;
            height: 130px;
            display: block;
            border-radius: 8px;
        }

        .qr-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Divider line for desktop */
        .divider {
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--card-border), transparent);
            margin: 16px 0;
        }

        @media (max-width: 650px) {
            .invite-card {
                flex-direction: column;
                padding: 16px;
            }
            .divider {
                width: auto;
                height: 1px;
                background: linear-gradient(to right, transparent, var(--card-border), transparent);
                margin: 0 16px;
            }
            .content-section {
                padding: 24px 16px;
            }
            .qr-section {
                padding: 24px 16px;
                background: transparent;
                border: none;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="invite-card">
        <div class="content-section">
            <div class="subtitle">You have been invited to join</div>
            
            <div class="server-info">
                <div class="server-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 22 12 17 22 22 12 2"></polygon>
                    </svg>
                </div>
                <div class="server-details">
                    <div class="server-name">Cine-Hub</div>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="dot online"></div>
                            <span>1,452 Online</span>
                        </div>
                        <div class="stat-item">
                            <div class="dot offline"></div>
                            <span>10,000 Members</span>
                        </div>
                    </div>
                </div>
            </div>

            <a href="https://discord.gg/YE6ZrFC6y" target="_blank" class="join-btn">Accept Invitation</a>
        </div>

        <div class="divider"></div>

        <div class="qr-section">
            <div class="qr-wrapper">
                <img class="qr-image" src="https://quickchart.io/qr?text=https://discord.gg/YE6ZrFC6y&size=150&margin=0&dark=09090b&light=ffffff" alt="Scan to join">
            </div>
            <div class="qr-text">Scan to Join Brotato ;)</div>
        </div>
    </div>
</body>
</html>
